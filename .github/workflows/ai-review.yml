name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: Mohit-Raj-Singh/MergeMind_AI@v1
        with:
          provider: gemini
          api_key: ${{ secrets.GEMINI_API_KEY }}